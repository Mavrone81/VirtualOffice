# Production stack for VirtualOffice on the 165 droplet (shared host).
# App is proxied by nginx (vo.enshrine.com.sg -> 127.0.0.1:10502).
# Run migrations + seed once via:  docker compose -f docker-compose.prod.yml --profile tools run --rm migrate
services:
  db:
    image: postgres:16-alpine
    container_name: virtualoffice-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: virtualoffice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: virtualoffice
    volumes:
      - vo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U virtualoffice -d virtualoffice"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    # CI builds & pushes this image to GHCR; prod `pull`s it (see
    # .github/workflows/ci-cd.yml). `build:` is kept as a manual fallback so
    # `docker compose build app` still works on the server if ever needed.
    image: ${APP_IMAGE:-ghcr.io/mavrone81/virtualoffice:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virtualoffice-app
    restart: unless-stopped
    env_file: .env
    environment:
      STORAGE_DIR: /data/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:10502:3000" # nginx proxies here
    volumes:
      - vo_uploads:/data/uploads # persisted associate photos / documents

  # prisma migrate deploy — DEPLOY ONLY, never seeds prod (the lightweight
  # `migrator` image rebuilds fast). CI runs this on every deploy, so schema
  # migrations apply automatically. To seed a FRESH environment (rare), use the
  # builder target explicitly: `run --rm --build -T migrate` won't seed —
  # instead run `... run --rm --build $(target=builder) ... pnpm prisma db seed`.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    profiles: ["tools"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pnpm prisma migrate deploy"

volumes:
  vo_pgdata:
  vo_uploads:
